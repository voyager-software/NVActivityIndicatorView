name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    # This package requires Swift 6.3, so it needs the macOS 26 image (Xcode 26+).
    # The older `macos-15` / `macos-latest` images ship Xcode 16 and fail package
    # resolution on the swift-tools-version: 6.3 manifest.
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          # For simulator platforms a concrete device is resolved at runtime
          # (see "Resolve destination"), since device names vary by Xcode image.
          - name: iOS
            command: test
            sim_runtime: iOS
            device_pattern: iPhone
          - name: tvOS
            command: test
            sim_runtime: tvOS
            device_pattern: Apple TV
          - name: Mac Catalyst
            # The Catalyst test host can be flaky on CI, so only build there.
            command: build
            destination: "platform=macOS,variant=Mac Catalyst"
    steps:
      - uses: actions/checkout@v5

      - name: Select newest available Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve destination
        id: destination
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.sim_runtime }}" ]; then
            udid=$(xcrun simctl list devices available --json | python3 -c 'import json,sys; devices=json.load(sys.stdin)["devices"]; ids=[d["udid"] for rt,devs in devices.items() if sys.argv[1] in rt for d in devs if sys.argv[2] in d["name"]]; print(ids[0] if ids else "")' "${{ matrix.sim_runtime }}" "${{ matrix.device_pattern }}")
            if [ -z "$udid" ]; then
              echo "No available ${{ matrix.device_pattern }} simulator for ${{ matrix.sim_runtime }}" >&2
              xcrun simctl list devices available >&2
              exit 1
            fi
            echo "value=platform=${{ matrix.sim_runtime }} Simulator,id=$udid" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ matrix.destination }}" >> "$GITHUB_OUTPUT"
          fi

      - name: ${{ matrix.command }} (${{ matrix.name }})
        run: |
          set -o pipefail
          echo "Destination: ${{ steps.destination.outputs.value }}"
          xcodebuild ${{ matrix.command }} \
            -scheme NVActivityIndicatorView \
            -destination "${{ steps.destination.outputs.value }}"
