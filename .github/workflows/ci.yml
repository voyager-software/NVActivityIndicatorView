name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    # NOTE: This package requires Swift 6.3 (Xcode 26+). The job only passes on a
    # runner image that ships that toolchain. Bump `runs-on` / pin a specific
    # Xcode below once GitHub-hosted images include it, or use a self-hosted runner.
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS
            command: test
            destination: "platform=iOS Simulator,name=iPhone 16,OS=latest"
          - name: tvOS
            command: test
            destination: "platform=tvOS Simulator,name=Apple TV 4K (3rd generation),OS=latest"
          - name: Mac Catalyst
            # The Catalyst test host can be flaky on CI, so only build there.
            command: build
            destination: "platform=macOS,variant=Mac Catalyst"
    steps:
      - uses: actions/checkout@v4

      - name: Select newest available Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Versions
        run: |
          xcodebuild -version
          swift --version

      - name: ${{ matrix.command }} (${{ matrix.name }})
        run: |
          set -o pipefail
          xcodebuild ${{ matrix.command }} \
            -scheme NVActivityIndicatorView \
            -destination "${{ matrix.destination }}"
