name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    # This package requires Swift 6.3, so it needs the macOS 26 image (Xcode 26+).
    # The older `macos-15` / `macos-latest` images ship Xcode 16 and fail package
    # resolution on the swift-tools-version: 6.3 manifest.
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS
            command: test
            destination: "platform=iOS Simulator,name=iPhone 16,OS=latest"
          - name: tvOS
            command: test
            destination: "platform=tvOS Simulator,name=Apple TV 4K (3rd generation),OS=latest"
          - name: Mac Catalyst
            # The Catalyst test host can be flaky on CI, so only build there.
            command: build
            destination: "platform=macOS,variant=Mac Catalyst"
    steps:
      - uses: actions/checkout@v5

      - name: Select newest available Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Versions
        run: |
          xcodebuild -version
          swift --version

      - name: ${{ matrix.command }} (${{ matrix.name }})
        run: |
          set -o pipefail
          xcodebuild ${{ matrix.command }} \
            -scheme NVActivityIndicatorView \
            -destination "${{ matrix.destination }}"
